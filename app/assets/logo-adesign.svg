<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="ADesign Financeiro">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8f400"/>
      <stop offset="100%" stop-color="#3d6200"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#99e000"/>
      <stop offset="100%" stop-color="#2a4500"/>
    </linearGradient>
  </defs>
  <!-- Forma esquerda: boomerang espelhado (chevron duplo) -->
